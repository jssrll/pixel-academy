<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Library Vista | Digital Catalog</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS Stylesheet - FIXED PATH -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <i class="fas fa-book-open" style="color: #007aff; font-size: 1.8rem;"></i>
        <div>
            <h1>Library Vista</h1>
            <p>curated collections · intelligent catalog</p>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="nav-tab active" data-page="library"><i class="fas fa-book"></i> Library</div>
        <div class="nav-tab" data-page="ai-tools"><i class="fas fa-robot"></i> AI Tools</div>
        <div class="nav-tab" data-page="minsu"><i class="fas fa-university"></i> MinSU Portal</div>
        <div class="nav-tab" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
    </div>
    <div class="header-actions">
        <div class="library-stats" id="statsDisplay"><i class="fas fa-layer-group"></i> <span id="totalBooksCount">0</span> books</div>
        <button class="refresh-btn" id="manualRefreshBtn"><i class="fas fa-arrow-rotate-right"></i></button>
        <div class="profile-icon" id="profileIconBtn"><i class="fas fa-user"></i></div>
    </div>
</header>

<div id="categoryStrip" class="category-strip" style="display: none;">
    <div class="categories-container" id="categoryFilterContainer"></div>
</div>

<main class="main-content" id="mainContent"></main>
<div class="footer-note"><i class="fas fa-database"></i> Google Sheets Backend Ready · Apple-inspired Design</div>

<!-- Detail Modal -->
<div id="detailModal" class="detail-modal">
    <div class="modal-card">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <div id="modalContent">
            <h3 id="modalTitle"></h3>
            <p id="modalAuthor" style="color: #6e6e73; margin-bottom: 12px;"></p>
            <p id="modalCategory" style="margin-bottom: 16px;"></p>
            <p id="modalDesc" style="line-height: 1.5;"></p>
            <a id="modalLink" href="#" target="_blank" class="modal-link">Open Book <i class="fas fa-external-link-alt"></i></a>
        </div>
    </div>
</div>

<!-- JavaScript Files - FIXED PATHS - Load in correct order -->
<script src="js/books-database.js"></script>
<script src="js/ai-tools.js"></script>
<script src="js/minsu-portal.js"></script>
<script src="js/settings.js"></script>
<script src="js/chatbase.js"></script>
<script src="js/script.js"></script>
</body>
</html>
