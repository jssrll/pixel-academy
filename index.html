<body>

<header class="app-header">
    <div class="logo-area">
        <i class="fas fa-book-open" style="color: #2c3e50; font-size: 1.8rem;"></i>
        <div>
            <h1>Pixel Academy</h1>
            <p>digital library · free for minsu students</p>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="nav-tab active" data-page="library"><i class="fas fa-book"></i> Library</div>
        <div class="nav-tab" data-page="ai-tools"><i class="fas fa-robot"></i> AI Tools</div>
        <div class="nav-tab" data-page="minsu"><i class="fas fa-university"></i> MinSU Portal</div>
        <div class="nav-tab" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
    </div>
    <div class="header-actions">
        <div class="library-stats" id="statsDisplay"><i class="fas fa-layer-group"></i> <span id="totalBooksCount">0</span> resources</div>
        <button class="refresh-btn" id="manualRefreshBtn"><i class="fas fa-arrow-rotate-right"></i></button>
        <div class="profile-icon" id="profileIconBtn"><i class="fas fa-user"></i></div>
    </div>
</header>

<div id="categoryStrip" class="category-strip" style="display: none;">
    <div class="categories-container" id="categoryFilterContainer"></div>
</div>

<main class="main-content" id="mainContent"></main>
<div class="footer-note"><i class="fas fa-database"></i> Google Sheets Backend · Free for Minsu Students</div>

<!-- Detail Modal -->
<div id="detailModal" class="detail-modal">
    <div class="modal-card">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <div id="modalContent">
            <h3 id="modalTitle"></h3>
            <p id="modalAuthor" style="color: #6e6e73; margin-bottom: 12px;"></p>
            <p id="modalCategory" style="margin-bottom: 16px;"></p>
            <p id="modalDesc" style="line-height: 1.5;"></p>
            <a id="modalLink" href="#" target="_blank" class="modal-link">Open Resource <i class="fas fa-external-link-alt"></i></a>
        </div>
    </div>
</div>

<!-- Account Modal -->
<div id="accountModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2><i class="fas fa-graduation-cap"></i> Pixel Academy Account</h2>
      <button class="close-modal" onclick="closeAccountModal()">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    
    <!-- LOGIN TAB -->
    <div id="loginTab" class="tab-content active">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> School ID Number</label>
          <input type="text" id="loginSchoolId" placeholder="Enter your School ID" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Passcode</label>
          <input type="password" id="loginPasscode" placeholder="Enter your passcode" required>
        </div>
        <button type="submit" class="btn-primary-apple full-width" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
    </div>
    
    <!-- REGISTER TAB -->
    <div id="registerTab" class="tab-content">
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="regFullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> School ID Number</label>
          <input type="text" id="regSchoolId" placeholder="Enter your School ID" required>
          <small id="schoolIdCheckMsg" style="display: none;"></small>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Passcode</label>
          <input type="password" id="regPasscode" placeholder="Create a passcode" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-check-circle"></i> Confirm Passcode</label>
          <input type="password" id="regConfirmPasscode" placeholder="Confirm your passcode" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-user-tag"></i> Status</label>
          <select id="regStatus" class="settings-select" required>
            <option value="">Select Status</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty/Staff</option>
          </select>
        </div>
        
        <!-- Student Only Fields -->
        <div id="studentFields" style="display: none;">
          <div class="form-group">
            <label><i class="fas fa-layer-group"></i> Year Level</label>
            <select id="regYearLevel" class="settings-select">
              <option value="">Select Year Level</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-users"></i> Section</label>
            <input type="text" id="regSection" placeholder="Enter your section (e.g., A, B, C)">
          </div>
        </div>
        
        <button type="submit" class="btn-primary-apple full-width" id="registerBtn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
        <div id="registerLoading" class="loading-indicator" style="display: none;">
          <i class="fas fa-spinner fa-spin"></i> Creating account...
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Install PWA Prompt (shows when app is installable) -->
<div id="installPrompt" class="install-prompt" style="display: none;">
    <div class="install-prompt-content">
        <i class="fas fa-download"></i>
        <div>
            <h4>Install Pixel Academy</h4>
            <p>Add to home screen for easy access</p>
        </div>
        <button id="installBtn" class="install-btn">Install</button>
        <button id="closeInstallPrompt" class="close-install">&times;</button>
    </div>
</div>

<!-- PWA Service Worker Registration -->
<script>
    // Fix: Use correct path for service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Use relative path './sw.js' instead of '/sw.js'
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registered successfully:', registration.scope);
                })
                .catch(error => {
                    console.log('❌ Service Worker registration failed:', error);
                });
        });
    }
    
    // PWA Install Prompt - Custom Button
    let deferredPrompt;
    const installPromptDiv = document.getElementById('installPrompt');
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('✅ Install prompt available - showing custom button');
        
        // Show custom install prompt
        if (installPromptDiv) {
            installPromptDiv.style.display = 'block';
        }
    });
    
    // Handle install button click
    const installBtn = document.getElementById('installBtn');
    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User ${outcome} the install prompt`);
                deferredPrompt = null;
                
                // Hide custom prompt
                if (installPromptDiv) {
                    installPromptDiv.style.display = 'none';
                }
            }
        });
    }
    
    // Close install prompt
    const closeInstallPrompt = document.getElementById('closeInstallPrompt');
    if (closeInstallPrompt) {
        closeInstallPrompt.addEventListener('click', () => {
            if (installPromptDiv) {
                installPromptDiv.style.display = 'none';
            }
        });
    }
    
    // Handle app installed event
    window.addEventListener('appinstalled', () => {
        console.log('✅ App was installed successfully');
        if (installPromptDiv) {
            installPromptDiv.style.display = 'none';
        }
    });
    
    // Check if already installed (standalone mode)
    if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('App is running in standalone mode (installed)');
        if (installPromptDiv) {
            installPromptDiv.style.display = 'none';
        }
    }
    
    // Force refresh favicon on deployed site
    (function refreshFavicon() {
        const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = './favicon/favicon.ico?' + Date.now();
        document.getElementsByTagName('head')[0].appendChild(link);
    })();
</script>

<!-- JavaScript Files -->
<script src="js/books-database.js"></script>
<script src="js/ai-tools.js"></script>
<script src="js/minsu-portal.js"></script>
<script src="js/settings.js"></script>
<script src="js/script.js"></script>
</body>
</html>
