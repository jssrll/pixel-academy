<!-- PWA Installation Script -->
<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('ServiceWorker registered successfully:', registration);
        })
        .catch(error => {
          console.log('ServiceWorker registration failed:', error);
        });
    });
  }
  
  // Handle PWA installation prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    console.log('PWA install prompt available');
    
    // Show install banner
    showInstallBanner();
  });
  
  function showInstallBanner() {
    const banner = document.getElementById('installBanner');
    if (banner) {
      banner.style.display = 'flex';
    }
  }
  
  function installPWA() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choiceResult) => {
        if (choiceResult.outcome === 'accepted') {
          console.log('User accepted the install prompt');
        }
        deferredPrompt = null;
        hideInstallBanner();
      });
    }
  }
  
  function hideInstallBanner() {
    const banner = document.getElementById('installBanner');
    if (banner) {
      banner.style.display = 'none';
    }
  }
</script>

<!-- Install Banner -->
<div id="installBanner" style="display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000; border: 1px solid #e9e9ef;">

    </div>
    <button onclick="installPWA()" style="background: #2c3e50; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600;">Install</button>
    <button onclick="hideInstallBanner()" style="background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #8e8e93;">&times;</button>
