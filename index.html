<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pixel Academy Portal · Advanced Learning</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-wrapper">
        <div class="glass-card">
            <div class="login-header">
                <span class="badge">📘 PIXEL ACADEMY</span>
                <h2>welcome back</h2>
                <p>sign in with your school ID</p>
            </div>
            <div class="input-group">
                <label>Minsu School ID Number</label>
                <input type="text" id="loginSchoolId" placeholder="e.g., MCC2025-00295">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button class="login-btn" id="loginBtn">log in →</button>
            <div class="register-row">
                <span>no account?</span>
                <button class="register-link" id="registerBtn">Register here</button>
            </div>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="dashboard-container">
        <button class="burger-menu" id="burgerMenu">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        
        <div class="dashboard-grid">
            <aside class="sidebar" id="sidebar">
                <div class="logo-side">📘 Pixel Academy<span>portal</span></div>
                <nav>
                    <div class="nav-item active" data-page="dashboard">
                        <i class="fas fa-home"></i> Dashboard
                    </div>
                    <div class="nav-item" data-page="profile">
                        <i class="fas fa-user"></i> My Profile
                    </div>
                    <div class="nav-item" data-page="about">
                        <i class="fas fa-info-circle"></i> About
                    </div>
                    <div class="nav-item" data-page="settings">
                        <i class="fas fa-cog"></i> Settings
                    </div>
                    <div class="nav-item logout-item" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </div>
                </nav>
            </aside>
            <main class="main-content" id="mainContent">
                <div class="loading" style="margin: 2rem auto;"></div>
            </main>
        </div>
    </div>

    <!-- Registration Modal -->
    <div class="modal" id="registrationModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> Student Registration</h2>
                <button class="close-btn" id="closeRegistrationBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="registrationForm" class="registration-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g., Juan M. Dela Cruz" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Minsu School ID Number</label>
                        <input type="text" id="schoolId" placeholder="e.g., MCC2025-00295" required>
                        <small>Format: MCCYYYY-XXXXX (e.g., MCC2025-00295)</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Minimum 6 characters" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Program</label>
                        <select id="program" required>
                            <option value="">Select Program</option>
                            <option value="BSIT">BSIT - Bachelor of Science in Information Technology</option>
                            <option value="BAELS">BAELS - Bachelor of Arts in English Language Studies</option>
                            <option value="BAPsychology">BAPsychology - Bachelor of Arts in Psychology</option>
                            <option value="BSTM">BSTM - Bachelor of Science in Tourism Management</option>
                            <option value="BSHM">BSHM - Bachelor of Science in Hospitality Management</option>
                            <option value="BSCrim">BSCrim - Bachelor of Science in Criminology</option>
                            <option value="BSED">BSED - Bachelor of Secondary Education</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Year Level</label>
                        <select id="yearLevel" required>
                            <option value="">Select Year Level</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Section</label>
                        <input type="text" id="section" placeholder="e.g., 1-F1" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="cancelRegBtn">Cancel</button>
                        <button type="submit" class="btn-submit">Register</button>
                    </div>
                    
                    <div id="regError" class="error-message" style="display: none;"></div>
                    <div id="regSuccess" class="success-message" style="display: none;"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" style="display: none;"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
