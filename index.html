<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Library Vista | Digital Catalog</title>
    
    <!-- ========== FAVICON FILES ========== -->
    <!-- Basic favicon -->
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon/favicon-48x48.png">
    
    <!-- Apple Touch Icon (for iOS devices) -->
    <link rel="apple-touch-icon" sizes="57x57" href="favicon/apple-touch-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="favicon/apple-touch-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="favicon/apple-touch-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="favicon/apple-touch-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="favicon/apple-touch-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="favicon/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="favicon/apple-touch-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="favicon/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon-180x180.png">
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Theme color for browsers -->
    <meta name="theme-color" content="#007aff">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <i class="fas fa-book-open" style="color: #007aff; font-size: 1.8rem;"></i>
        <div>
            <h1>Library Vista</h1>
            <p>curated collections · intelligent catalog</p>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="nav-tab active" data-page="library"><i class="fas fa-book"></i> Library</div>
        <div class="nav-tab" data-page="ai-tools"><i class="fas fa-robot"></i> AI Tools</div>
        <div class="nav-tab" data-page="minsu"><i class="fas fa-university"></i> MinSU Portal</div>
        <div class="nav-tab" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
    </div>
    <div class="header-actions">
        <div class="library-stats" id="statsDisplay"><i class="fas fa-layer-group"></i> <span id="totalBooksCount">0</span> books</div>
        <button class="refresh-btn" id="manualRefreshBtn"><i class="fas fa-arrow-rotate-right"></i></button>
        <div class="profile-icon" id="profileIconBtn"><i class="fas fa-user"></i></div>
    </div>
</header>

<div id="categoryStrip" class="category-strip" style="display: none;">
    <div class="categories-container" id="categoryFilterContainer"></div>
</div>

<main class="main-content" id="mainContent"></main>
<div class="footer-note"><i class="fas fa-database"></i> Google Sheets Backend Ready · Apple-inspired Design</div>

<!-- Detail Modal -->
<div id="detailModal" class="detail-modal">
    <div class="modal-card">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <div id="modalContent">
            <h3 id="modalTitle"></h3>
            <p id="modalAuthor" style="color: #6e6e73; margin-bottom: 12px;"></p>
            <p id="modalCategory" style="margin-bottom: 16px;"></p>
            <p id="modalDesc" style="line-height: 1.5;"></p>
            <a id="modalLink" href="#" target="_blank" class="modal-link">Open Book <i class="fas fa-external-link-alt"></i></a>
        </div>
    </div>
</div>

<script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('ServiceWorker registered: ', registration);
                })
                .catch(error => {
                    console.log('ServiceWorker registration failed: ', error);
                });
        });
    }
</script>

<!-- JavaScript Files - FIXED PATHS - Load in correct order -->
<script src="js/books-database.js"></script>
<script src="js/ai-tools.js"></script>
<script src="js/minsu-portal.js"></script>
<script src="js/settings.js"></script>
<script src="js/chatbase.js"></script>
<script src="js/script.js"></script>
</body>
</html>
